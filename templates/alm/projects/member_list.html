{% extends 'alm/base_project.html' %}

{% block title %}Membres - {{ project.name }}{% endblock %}

{% block alm_content %}
<div class="bg-white rounded-lg shadow">
    <div class="px-6 py-4 border-b flex justify-between items-center">
        <h1 class="text-xl font-semibold">Membres</h1>
        <a href="{% url 'member_add' project.id %}" class="bg-[#1a3a6b] text-white px-4 py-2 rounded text-sm hover:bg-[#142b52]">Ajouter</a>
    </div>
    <ul class="divide-y">
        {% for m in members %}
        <li class="px-6 py-3 flex justify-between items-center">
            <div>
                <span class="font-medium">{{ m.user.username }}</span>
                <span class="text-sm text-gray-500 ml-2">{{ m.get_role_display }}</span>
            </div>
            <a href="{% url 'member_remove' project.id m.id %}" class="text-sm text-red-600 hover:underline">Retirer</a>
        </li>
        {% empty %}
        <li class="px-6 py-8 text-center text-gray-500">Aucun membre</li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
