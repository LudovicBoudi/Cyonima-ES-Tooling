{% extends 'alm/base_project.html' %}

{% block title %}Ajouter des tests - {{ campaign.name }}{% endblock %}

{% block alm_content %}
<div class="max-w-lg mx-auto bg-white rounded-lg shadow p-6">
    <h1 class="text-xl font-semibold mb-2">Ajouter des tests</h1>
    <p class="text-sm text-gray-500 mb-4">à la campagne : {{ campaign.name }}</p>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Scénarios disponibles</label>
            <select name="tests" multiple class="w-full px-3 py-2 border rounded text-sm h-48">
                {% for t in available %}
                <option value="{{ t.id }}">{{ t.get_formatted_number }} - {{ t.name }}</option>
                {% empty %}
                <option disabled>Aucun test disponible</option>
                {% endfor %}
            </select>
        </div>
        <div class="flex gap-3">
            <button type="submit" class="bg-[#1a3a6b] text-white px-4 py-2 rounded text-sm hover:bg-[#142b52]">Ajouter</button>
            <a href="{% url 'campaign_detail' project.id campaign.id %}" class="px-4 py-2 rounded text-sm border border-gray-300 hover:bg-gray-50">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
