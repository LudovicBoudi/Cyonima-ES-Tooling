{% extends 'alm/base_project.html' %}

{% block title %}{{ title }}{% endblock %}

{% block alm_content %}
<div class="max-w-lg mx-auto bg-white rounded-lg shadow p-6">
    <h1 class="text-xl font-semibold mb-6">{{ title }}</h1>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nom</label>
            <input type="text" name="name" required class="w-full px-3 py-2 border rounded text-sm">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
            <textarea name="description" rows="3" class="w-full px-3 py-2 border rounded text-sm"></textarea>
        </div>
        <div class="flex gap-3">
            <button type="submit" class="bg-[#1a3a6b] text-white px-4 py-2 rounded text-sm hover:bg-[#142b52]">Créer</button>
            <a href="{% url 'campaign_list' project.id %}" class="px-4 py-2 rounded text-sm border border-gray-300 hover:bg-gray-50">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
