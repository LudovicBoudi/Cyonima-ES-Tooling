{% extends 'alm/base_project.html' %}

{% block title %}{{ title }}{% endblock %}

{% block alm_content %}
<div class="max-w-2xl mx-auto bg-white rounded-lg shadow p-6">
    <h1 class="text-xl font-semibold mb-6">{{ title }}</h1>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Catégorie</label>
            <select name="category" class="w-full px-3 py-2 border rounded text-sm">
                <option value="folder" {% if req.category == 'folder' %}selected{% endif %}>Dossier</option>
                <option value="metier" {% if req.category == 'metier' %}selected{% endif %}>Métier</option>
                <option value="infrastructure" {% if req.category == 'infrastructure' %}selected{% endif %}>Infrastructure</option>
                <option value="logiciel" {% if req.category == 'logiciel' %}selected{% endif %}>Logiciel</option>
                <option value="securite" {% if req.category == 'securite' %}selected{% endif %}>Sécurité</option>
                <option value="reseau" {% if req.category == 'reseau' %}selected{% endif %}>Réseau</option>
                <option value="administration" {% if req.category == 'administration' %}selected{% endif %}>Administration</option>
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Dossier parent</label>
            <select name="parent" class="w-full px-3 py-2 border rounded text-sm">
                <option value="">Aucun (racine)</option>
                {% for f in folders %}
                    <option value="{{ f.id }}" {% if req.parent_id == f.id %}selected{% endif %}>{{ f.get_formatted_number }} - {{ f.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nom</label>
            <input type="text" name="name" value="{{ req.name|default:'' }}" required class="w-full px-3 py-2 border rounded text-sm">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
            <textarea name="description" rows="5" maxlength="4000" class="w-full px-3 py-2 border rounded text-sm">{{ req.description|default:'' }}</textarea>
        </div>
        <div class="flex gap-3">
            <button type="submit" class="bg-[#1a3a6b] text-white px-4 py-2 rounded text-sm hover:bg-[#142b52]">Enregistrer</button>
            <a href="{% url 'requirement_list' project.id %}" class="px-4 py-2 rounded text-sm border border-gray-300 hover:bg-gray-50">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
