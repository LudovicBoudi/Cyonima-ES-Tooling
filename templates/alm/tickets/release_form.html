{% extends 'alm/base_project.html' %}
{% block title %}{{ title }} - {{ project.name }}{% endblock %}
{% block alm_content %}
<div class="max-w-xl mx-auto bg-white rounded-lg shadow p-6">
    <h1 class="text-xl font-semibold mb-6">{{ title }}</h1>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nom</label>
            <input type="text" name="name" value="{{ release.name|default:'' }}" required class="w-full px-3 py-2 border rounded text-sm">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Version</label>
            <input type="text" name="version" value="{{ release.version|default:'' }}" placeholder="1.0.0" class="w-full px-3 py-2 border rounded text-sm">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
            <textarea name="description" rows="3" class="w-full px-3 py-2 border rounded text-sm">{{ release.description|default:'' }}</textarea>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Date de sortie</label>
            <input type="date" name="release_date" value="{{ release.release_date|date:'Y-m-d'|default:'' }}" class="w-full px-3 py-2 border rounded text-sm">
        </div>
        <div class="flex items-center gap-2">
            <input type="checkbox" name="is_released" id="id_is_released" {% if release.is_released %}checked{% endif %}>
            <label for="id_is_released" class="text-sm">Publiée</label>
        </div>
        <div class="flex gap-3">
            <button type="submit" class="bg-[#1a3a6b] text-white px-4 py-2 rounded text-sm hover:bg-[#142b52]">Créer</button>
            <a href="{% url 'release_list' project.id %}" class="px-4 py-2 border rounded text-sm hover:bg-gray-50">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
