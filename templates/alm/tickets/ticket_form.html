{% extends 'alm/base_project.html' %}

{% block title %}{{ title }}{% endblock %}

{% block alm_content %}
<div class="max-w-2xl mx-auto bg-white rounded-lg shadow p-6">
    <h1 class="text-xl font-semibold mb-6">{{ title }}</h1>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Type</label>
            <select name="ticket_type" class="w-full px-3 py-2 border rounded text-sm">
                <option value="incident">Incident</option>
                <option value="tache">Tâche</option>
                <option value="ft">Fait technique</option>
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Titre</label>
            <input type="text" name="title" required class="w-full px-3 py-2 border rounded text-sm">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
            <textarea name="description" rows="4" class="w-full px-3 py-2 border rounded text-sm"></textarea>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Assigné à</label>
            <select name="assigned_to" class="w-full px-3 py-2 border rounded text-sm">
                <option value="">Non assigné</option>
                {% for m in members %}
                <option value="{{ m.user.id }}">{{ m.user.username }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Date début</label>
                <input type="date" name="start_date" class="w-full px-3 py-2 border rounded text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Date échéance</label>
                <input type="date" name="due_date" class="w-full px-3 py-2 border rounded text-sm">
            </div>
        </div>
        <div class="flex gap-3">
            <button type="submit" class="bg-[#1a3a6b] text-white px-4 py-2 rounded text-sm hover:bg-[#142b52]">Créer</button>
            <a href="{% url 'ticket_list' project.id %}" class="px-4 py-2 rounded text-sm border border-gray-300 hover:bg-gray-50">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
