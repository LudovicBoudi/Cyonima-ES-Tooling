{% extends 'alm/base_project.html' %}
{% block title %}{{ title }} - {{ project.name }}{% endblock %}
{% block alm_content %}
<div class="max-w-2xl mx-auto bg-white rounded-lg shadow p-6">
    <h1 class="text-xl font-semibold mb-6">{{ title }}</h1>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nom</label>
            <input type="text" name="name" value="{{ sprint.name|default:'' }}" required class="w-full px-3 py-2 border rounded text-sm">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
            <textarea name="description" rows="3" class="w-full px-3 py-2 border rounded text-sm">{{ sprint.description|default:'' }}</textarea>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Date début</label>
                <input type="date" name="start_date" value="{{ sprint.start_date|date:'Y-m-d'|default:'' }}" required class="w-full px-3 py-2 border rounded text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Date fin</label>
                <input type="date" name="end_date" value="{{ sprint.end_date|date:'Y-m-d'|default:'' }}" required class="w-full px-3 py-2 border rounded text-sm">
            </div>
        </div>
        <div>
            <label class="inline-flex items-center gap-2">
                <input type="checkbox" name="is_active" {% if sprint.is_active %}checked{% endif %} class="rounded border-gray-300">
                <span class="text-sm">Sprint actif</span>
            </label>
        </div>
        <div class="flex gap-3">
            <button type="submit" class="bg-[#1a3a6b] text-white px-4 py-2 rounded text-sm hover:bg-[#142b52]">{% if sprint %}Enregistrer{% else %}Créer{% endif %}</button>
            <a href="{% url 'sprint_list' project.id %}" class="px-4 py-2 rounded text-sm border border-gray-300 hover:bg-gray-50">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
