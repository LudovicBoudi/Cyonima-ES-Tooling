{% extends 'base.html' %}

{% block title %}Changement de mot de passe{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <div class="bg-white rounded-xl shadow-md p-8">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">Changer le mot de passe</h1>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            {% for field in form %}
                <div>
                    <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit"
                    class="w-full bg-[#1a3a6b] text-white py-2 px-4 rounded-lg hover:bg-[#142b52] transition-colors font-medium">
                Changer le mot de passe
            </button>
        </form>
    </div>
</div>
{% endblock %}
