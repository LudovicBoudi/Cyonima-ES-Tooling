{% extends 'base.html' %}

{% block title %}Connexion{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-md p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <div class="w-20 h-20 mx-auto mb-4 flex items-center justify-center">
                {% if site_config.logo %}
                    <img src="{{ site_config.logo.url }}" alt="{{ site_config.site_name }}" class="max-w-full max-h-full">
                {% else %}
                    <span class="text-4xl font-bold text-[#1a3a6b]">C</span>
                {% endif %}
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Connexion</h1>
            <p class="text-gray-500 text-sm mt-1">{{ site_config.site_name }}</p>
        </div>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            {% if form.errors %}
                <div class="bg-red-100 text-red-700 px-4 py-3 rounded-lg text-sm border border-red-200">
                    Identifiants incorrects. Veuillez réessayer.
                </div>
            {% endif %}
            <div>
                <label for="id_username" class="block text-sm font-medium text-gray-700 mb-1">Nom d'utilisateur</label>
                <input type="text" name="username" id="id_username" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#1a3a6b] focus:border-[#1a3a6b] outline-none transition-colors">
            </div>
            <div>
                <label for="id_password" class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
                <input type="password" name="password" id="id_password" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#1a3a6b] focus:border-[#1a3a6b] outline-none transition-colors">
            </div>
            <button type="submit"
                    class="w-full bg-[#1a3a6b] text-white py-2 px-4 rounded-lg hover:bg-[#142b52] transition-colors font-medium">
                Se connecter
            </button>
        </form>
    </div>
</div>
{% endblock %}
