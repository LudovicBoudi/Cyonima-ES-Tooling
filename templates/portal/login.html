<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — Portail {{ site_config.site_name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#1a3a6b' } } } }
    </script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-lg p-8 w-full max-w-sm">
        <div class="text-center mb-6">
            {% if site_config.logo %}
                <img src="{{ site_config.logo.url }}" alt="" class="h-12 mx-auto mb-3">
            {% endif %}
            <h1 class="text-xl font-bold text-gray-800">Portail client</h1>
            <p class="text-sm text-gray-500">{{ site_config.site_name }}</p>
        </div>
        {% if messages %}
            {% for message in messages %}
                <div class="px-3 py-2 rounded-lg text-sm mb-4 {% if 'error' in message.tags %}bg-red-100 text-red-700{% else %}bg-green-100 text-green-700{% endif %}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Identifiant</label>
                {{ form.username }}
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
                {{ form.password }}
            </div>
            <button type="submit" class="w-full bg-[#1a3a6b] text-white py-2 rounded-lg hover:bg-blue-800 transition font-medium">Se connecter</button>
        </form>
    </div>
</body>
</html>
