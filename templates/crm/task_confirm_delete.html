{% extends 'crm/base_crm.html' %}
{% block title %}Supprimer — {{ task.title }}{% endblock %}
{% block crm_content %}
<div class="max-w-lg mx-auto bg-white rounded-xl shadow p-6 text-center">
    <h1 class="text-xl font-bold text-red-700 mb-4">Supprimer la tâche "{{ task.title }}" ?</h1>
    <p class="text-gray-600 mb-6">Cette action est irréversible.</p>
    <form method="post" class="flex gap-3 justify-center">
        {% csrf_token %}
        <button type="submit" class="bg-red-700 text-white px-6 py-2 rounded-lg text-sm hover:bg-red-800">Confirmer</button>
        <a href="{% url 'crm_task_list' %}" class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 text-sm">Annuler</a>
    </form>
</div>
{% endblock %}
