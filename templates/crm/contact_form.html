{% extends 'crm/base_crm.html' %}
{% block title %}{{ title }}{% endblock %}
{% block crm_content %}
<div class="max-w-2xl mx-auto bg-white rounded-xl shadow p-6">
    <h1 class="text-xl font-semibold mb-6">{{ title }}</h1>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div class="grid grid-cols-2 gap-4">
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Prénom *</label><input type="text" name="first_name" value="{{ contact.first_name|default:'' }}" required class="w-full px-3 py-2 border rounded text-sm"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Nom *</label><input type="text" name="last_name" value="{{ contact.last_name|default:'' }}" required class="w-full px-3 py-2 border rounded text-sm"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Société</label><select name="company" class="w-full px-3 py-2 border rounded text-sm"><option value="">—</option>{% for c in companies %}<option value="{{ c.pk }}" {% if contact and contact.company_id == c.pk %}selected{% endif %}>{{ c.name }}</option>{% endfor %}</select></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Fonction</label><input type="text" name="function" value="{{ contact.function|default:'' }}" class="w-full px-3 py-2 border rounded text-sm"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Email</label><input type="email" name="email" value="{{ contact.email|default:'' }}" class="w-full px-3 py-2 border rounded text-sm"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Téléphone</label><input type="text" name="phone" value="{{ contact.phone|default:'' }}" class="w-full px-3 py-2 border rounded text-sm"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Portable</label><input type="text" name="mobile" value="{{ contact.mobile|default:'' }}" class="w-full px-3 py-2 border rounded text-sm"></div>
            <div class="col-span-2"><label class="block text-sm font-medium text-gray-700 mb-1">Notes</label><textarea name="notes" rows="3" class="w-full px-3 py-2 border rounded text-sm">{{ contact.notes|default:'' }}</textarea></div>
        </div>
        <div class="flex gap-3 pt-2">
            <button type="submit" class="bg-[#1a3a6b] text-white px-6 py-2 rounded-lg text-sm hover:bg-blue-800">Enregistrer</button>
            <a href="{% url 'crm_contact_list' %}" class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 text-sm">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
