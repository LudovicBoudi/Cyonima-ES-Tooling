{% extends 'crm/base_crm.html' %}
{% block title %}{{ title }}{% endblock %}
{% block crm_content %}
<div class="max-w-2xl mx-auto bg-white rounded-xl shadow p-6">
    <h1 class="text-xl font-semibold mb-6">{{ title }}</h1>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div class="grid grid-cols-2 gap-4">
            <div class="col-span-2"><label class="block text-sm font-medium text-gray-700 mb-1">Titre *</label><input type="text" name="title" value="{{ deal.title|default:'' }}" required class="w-full px-3 py-2 border rounded text-sm"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Société</label><select name="company" class="w-full px-3 py-2 border rounded text-sm"><option value="">—</option>{% for c in companies %}<option value="{{ c.pk }}" {% if deal and deal.company_id == c.pk %}selected{% endif %}>{{ c.name }}</option>{% endfor %}</select></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Contact</label><select name="contact" class="w-full px-3 py-2 border rounded text-sm"><option value="">—</option>{% for c in contacts %}<option value="{{ c.pk }}" {% if deal and deal.contact_id == c.pk %}selected{% endif %}>{{ c.first_name }} {{ c.last_name }}</option>{% endfor %}</select></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Montant (€)</label><input type="number" step="0.01" name="amount" value="{{ deal.amount|default:'0' }}" class="w-full px-3 py-2 border rounded text-sm"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Probabilité (%)</label><input type="number" min="0" max="100" name="probability" value="{{ deal.probability|default:'0' }}" class="w-full px-3 py-2 border rounded text-sm"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Étape</label><select name="stage" class="w-full px-3 py-2 border rounded text-sm">{% for code, label in stage_choices %}<option value="{{ code }}" {% if deal and deal.stage == code %}selected{% endif %}>{{ label }}</option>{% endfor %}</select></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Date de clôture prévue</label><input type="date" name="expected_close_date" value="{% if deal and deal.expected_close_date %}{{ deal.expected_close_date|date:'Y-m-d' }}{% endif %}" class="w-full px-3 py-2 border rounded text-sm"></div>
            <div class="col-span-2"><label class="block text-sm font-medium text-gray-700 mb-1">Description</label><textarea name="description" rows="4" class="w-full px-3 py-2 border rounded text-sm">{{ deal.description|default:'' }}</textarea></div>
        </div>
        <div class="flex gap-3 pt-2">
            <button type="submit" class="bg-[#1a3a6b] text-white px-6 py-2 rounded-lg text-sm hover:bg-blue-800">Enregistrer</button>
            <a href="{% url 'crm_deal_list' %}" class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 text-sm">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
