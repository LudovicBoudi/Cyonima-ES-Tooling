{% extends 'crm/base_crm.html' %}
{% block title %}{{ title }}{% endblock %}
{% block crm_content %}
<div class="max-w-2xl mx-auto bg-white rounded-xl shadow p-6">
    <h1 class="text-xl font-semibold mb-6">{{ title }}</h1>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div class="grid grid-cols-2 gap-4">
            <div class="col-span-2"><label class="block text-sm font-medium text-gray-700 mb-1">Nom *</label><input type="text" name="name" value="{{ company.name|default:'' }}" required class="w-full px-3 py-2 border rounded text-sm"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Secteur</label><input type="text" name="sector" value="{{ company.sector|default:'' }}" class="w-full px-3 py-2 border rounded text-sm"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Site web</label><input type="url" name="website" value="{{ company.website|default:'' }}" class="w-full px-3 py-2 border rounded text-sm"></div>
            <div class="col-span-2"><label class="block text-sm font-medium text-gray-700 mb-1">Adresse</label><input type="text" name="address" value="{{ company.address|default:'' }}" class="w-full px-3 py-2 border rounded text-sm"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Code postal</label><input type="text" name="postal_code" value="{{ company.postal_code|default:'' }}" class="w-full px-3 py-2 border rounded text-sm"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Ville</label><input type="text" name="city" value="{{ company.city|default:'' }}" class="w-full px-3 py-2 border rounded text-sm"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Pays</label><input type="text" name="country" value="{{ company.country|default:'France' }}" class="w-full px-3 py-2 border rounded text-sm"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Téléphone</label><input type="text" name="phone" value="{{ company.phone|default:'' }}" class="w-full px-3 py-2 border rounded text-sm"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Email</label><input type="email" name="email" value="{{ company.email|default:'' }}" class="w-full px-3 py-2 border rounded text-sm"></div>
            <div class="col-span-2"><label class="block text-sm font-medium text-gray-700 mb-1">SIRET</label><input type="text" name="siret" value="{{ company.siret|default:'' }}" maxlength="14" class="w-full px-3 py-2 border rounded text-sm"></div>
            <div class="col-span-2"><label class="block text-sm font-medium text-gray-700 mb-1">Notes</label><textarea name="notes" rows="4" class="w-full px-3 py-2 border rounded text-sm">{{ company.notes|default:'' }}</textarea></div>
        </div>
        <div class="flex gap-3 pt-2">
            <button type="submit" class="bg-[#1a3a6b] text-white px-6 py-2 rounded-lg text-sm hover:bg-blue-800">Enregistrer</button>
            <a href="{% if company %}{% url 'crm_company_detail' company.pk %}{% else %}{% url 'crm_company_list' %}{% endif %}" class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 text-sm">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
