{% extends 'erp/base_erp.html' %}
{% block title %}Nouvel avoir — ERP{% endblock %}
{% block erp_content %}
<div class="bg-white rounded-xl shadow p-5">
    <h1 class="text-xl font-bold mb-4">Nouvel avoir</h1>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Société</label>
                <select name="company" class="w-full border rounded-lg px-3 py-2 text-sm">
                    <option value="">—</option>
                    {% for c in companies %}<option value="{{ c.pk }}">{{ c.name }}</option>{% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Facture liée</label>
                <select name="invoice" class="w-full border rounded-lg px-3 py-2 text-sm">
                    <option value="">—</option>
                    {% for inv in invoices %}<option value="{{ inv.pk }}">{{ inv.number }} — {{ inv.company|default:'' }}</option>{% endfor %}
                </select>
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Motif</label>
            <textarea name="reason" rows="3" class="w-full border rounded-lg px-3 py-2 text-sm"></textarea>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Lignes</label>
            {% if products %}
            <div class="flex gap-2 mb-2">
                <select id="product-select" class="border rounded-lg px-3 py-1.5 text-sm flex-1" onchange="insertProduct()">
                    <option value="">→ Insérer un produit du catalogue</option>
                    {% for p in products %}
                    <option value="{{ p.name }}|{{ p.unit_price }}|{{ p.vat_rate }}">{{ p.name }} — {{ p.unit_price }} € (TVA {{ p.vat_rate }}%)</option>
                    {% endfor %}
                </select>
            </div>
            {% endif %}
            <div id="lines-container" class="space-y-2"></div>
            <button type="button" onclick="addLine()" class="text-sm text-blue-600 hover:underline mt-2">+ Ajouter une ligne</button>
            <textarea name="lines_json" id="lines_json" class="hidden"></textarea>
        </div>
        <div class="flex gap-2">
            <button type="submit" class="bg-[#1a3a6b] text-white px-6 py-2 rounded-lg text-sm hover:bg-blue-800">Enregistrer</button>
            <a href="{% url 'erp_creditnote_list' %}" class="text-gray-500 px-4 py-2 text-sm">Annuler</a>
        </div>
    </form>
</div>
<script>
function addLine(desc, qty, price, vat) {
    const div = document.createElement('div');
    div.className = 'flex gap-2 items-end';
    div.innerHTML = `
        <input type="text" placeholder="Description" value="${desc||''}" class="flex-1 border rounded px-2 py-1 text-sm" oninput="saveLines()">
        <input type="number" step="0.01" placeholder="Qté" value="${qty||1}" class="w-20 border rounded px-2 py-1 text-sm" oninput="saveLines()">
        <input type="number" step="0.01" placeholder="P.U. HT" value="${price||0}" class="w-28 border rounded px-2 py-1 text-sm" oninput="saveLines()">
        <input type="number" step="0.1" placeholder="TVA %" value="${vat||20}" class="w-20 border rounded px-2 py-1 text-sm" oninput="saveLines()">
        <button type="button" onclick="this.parentElement.remove();saveLines()" class="text-red-500 text-sm">✕</button>
    `;
    document.getElementById('lines-container').appendChild(div);
}
function saveLines() {
    const rows = [];
    document.querySelectorAll('#lines-container > div').forEach(div => {
        const inputs = div.querySelectorAll('input');
        rows.push({
            description: inputs[0].value,
            quantity: parseFloat(inputs[1].value) || 0,
            unit_price: parseFloat(inputs[2].value) || 0,
            vat_rate: parseFloat(inputs[3].value) || 0,
        });
    });
    document.getElementById('lines_json').value = JSON.stringify(rows);
}
addLine();
function insertProduct() {
    const sel = document.getElementById('product-select');
    if (!sel.value) return;
    const [name, price, vat] = sel.value.split('|');
    addLine(name, 1, price, vat);
    saveLines();
    sel.value = '';
}
</script>
{% endblock %}
