{% extends 'erp/base_erp.html' %}
{% block title %}{{ title }} — ERP{% endblock %}
{% block erp_content %}
<div class="max-w-2xl mx-auto bg-white rounded-xl shadow p-6">
    <h1 class="text-xl font-bold mb-6">{{ title }}</h1>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Titre</label><input type="text" name="title" required class="w-full px-3 py-2 border rounded text-sm"></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Société</label><select name="company" class="w-full px-3 py-2 border rounded text-sm">{% for c in companies %}<option value="{{ c.pk }}">{{ c.name }}</option>{% endfor %}</select></div>
        <div class="grid grid-cols-2 gap-4">
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Fréquence</label><select name="frequency" class="w-full px-3 py-2 border rounded text-sm"><option value="monthly">Mensuelle</option><option value="quarterly">Trimestrielle</option><option value="yearly">Annuelle</option></select></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Prochaine échéance</label><input type="date" name="next_date" value="{% now 'Y-m-d' %}" class="w-full px-3 py-2 border rounded text-sm"></div>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Lignes</label>
            <div id="lines-container" class="space-y-2"></div>
            <button type="button" onclick="addLine()" class="text-sm text-blue-600 hover:underline mt-2">+ Ajouter une ligne</button>
            <textarea name="lines_json" id="lines_json" class="hidden"></textarea>
        </div>
        <div class="flex items-center gap-2"><input type="checkbox" name="is_active" checked id="id_active"><label for="id_active" class="text-sm">Active</label></div>
        <div class="flex gap-3"><button type="submit" class="bg-[#1a3a6b] text-white px-6 py-2 rounded-lg text-sm hover:bg-[#142b52]">Créer</button><a href="{% url 'erp_recurring_list' %}" class="px-4 py-2 border rounded text-sm hover:bg-gray-50">Annuler</a></div>
    </form>
</div>
<script>
function addLine(desc, qty, price, vat) {
    desc = desc || ''; qty = qty || 1; price = price || 0; vat = vat || 20;
    const div = document.createElement('div');
    div.className = 'flex gap-2 items-end';
    div.innerHTML = '<input type="text" placeholder="Description" value="'+desc+'" class="flex-1 border rounded px-2 py-1 text-sm" oninput="saveLines()"><input type="number" step="0.01" placeholder="Qté" value="'+qty+'" class="w-20 border rounded px-2 py-1 text-sm" oninput="saveLines()"><input type="number" step="0.01" placeholder="P.U. HT" value="'+price+'" class="w-28 border rounded px-2 py-1 text-sm" oninput="saveLines()"><input type="number" step="0.1" placeholder="TVA %" value="'+vat+'" class="w-20 border rounded px-2 py-1 text-sm" oninput="saveLines()"><button type="button" onclick="this.parentElement.remove();saveLines()" class="text-red-500 text-sm">✕</button>';
    document.getElementById('lines-container').appendChild(div);
}
function saveLines() {
    const rows = [];
    document.querySelectorAll('#lines-container > div').forEach(div => {
        const inputs = div.querySelectorAll('input');
        rows.push({ description: inputs[0].value, quantity: parseFloat(inputs[1].value)||0, unit_price: parseFloat(inputs[2].value)||0, vat_rate: parseFloat(inputs[3].value)||0 });
    });
    document.getElementById('lines_json').value = JSON.stringify(rows);
}
addLine();
</script>
{% endblock %}
