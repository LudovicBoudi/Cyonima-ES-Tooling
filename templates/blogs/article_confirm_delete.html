{% extends 'base.html' %}

{% block title %}Supprimer {{ article.title }}{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto bg-white rounded-lg shadow p-6 text-center">
    <div class="text-5xl text-red-500 mb-4">&#9888;</div>
    <p class="text-gray-500 mb-6">Supprimer <strong>{{ article.display_id }} - {{ article.title }}</strong> ?</p>
    <form method="post">
        {% csrf_token %}
        <div class="flex gap-3 justify-center">
            <button type="submit" class="bg-red-600 text-white px-4 py-2 rounded text-sm hover:bg-red-700">Confirmer</button>
            <a href="{% url list_url %}" class="px-4 py-2 rounded text-sm border border-gray-300 hover:bg-gray-50">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
