{% extends 'base.html' %}

{% block title %}Nouvel article - {{ blog_title }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded-lg shadow p-6">
    <h1 class="text-xl font-semibold mb-6">Nouvel article - {{ blog_title }}</h1>
    <form method="post" enctype="multipart/form-data" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Titre</label>
            <input type="text" name="title" maxlength="255" required class="w-full px-3 py-2 border rounded text-sm">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Contenu</label>
            <textarea name="content" rows="12" maxlength="10000" required class="w-full px-3 py-2 border rounded text-sm"></textarea>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Pièce jointe (PDF)</label>
            <input type="file" name="attachment" accept=".pdf" class="w-full text-sm">
        </div>
        <div class="flex gap-3">
            <button type="submit" class="bg-[#1a3a6b] text-white px-4 py-2 rounded text-sm hover:bg-[#142b52]">Publier</button>
            <a href="{% url list_url %}" class="px-4 py-2 rounded text-sm border border-gray-300 hover:bg-gray-50">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
