{% extends 'hr/base_hr.html' %}
{% block title %}{{ title }}{% endblock %}
{% block hr_content %}
<div class="max-w-lg mx-auto bg-white rounded-xl shadow p-6">
    <h1 class="text-xl font-semibold mb-6">{{ title }}</h1>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Nom *</label><input type="text" name="name" value="{{ department.name|default:'' }}" required class="w-full px-3 py-2 border rounded text-sm"></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Description</label><textarea name="description" rows="4" class="w-full px-3 py-2 border rounded text-sm">{{ department.description|default:'' }}</textarea></div>
        <div class="flex gap-3 pt-2">
            <button type="submit" class="bg-[#1a3a6b] text-white px-6 py-2 rounded-lg text-sm hover:bg-blue-800">Enregistrer</button>
            <a href="{% url 'hr_department_list' %}" class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 text-sm">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
