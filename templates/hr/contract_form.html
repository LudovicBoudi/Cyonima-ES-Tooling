{% extends 'hr/base_hr.html' %}
{% block title %}{{ title }}{% endblock %}
{% block hr_content %}
<div class="max-w-2xl mx-auto bg-white rounded-xl shadow p-6">
    <h1 class="text-xl font-semibold mb-6">{{ title }}</h1>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div class="grid grid-cols-2 gap-4">
            <div class="col-span-2"><label class="block text-sm font-medium text-gray-700 mb-1">Employé *</label><select name="employee" required class="w-full px-3 py-2 border rounded text-sm"><option value="">—</option>{% for e in employees %}<option value="{{ e.pk }}" {% if contract and contract.employee_id == e.pk %}selected{% endif %}>{{ e }}</option>{% endfor %}</select></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Type</label><select name="type" class="w-full px-3 py-2 border rounded text-sm">{% for code, label in type_choices %}<option value="{{ code }}" {% if contract and contract.type == code %}selected{% endif %}>{{ label }}</option>{% endfor %}</select></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Poste</label><input type="text" name="position" value="{{ contract.position|default:'' }}" class="w-full px-3 py-2 border rounded text-sm"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Date de début *</label><input type="date" name="start_date" value="{% if contract %}{{ contract.start_date|date:'Y-m-d' }}{% endif %}" required class="w-full px-3 py-2 border rounded text-sm"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Date de fin</label><input type="date" name="end_date" value="{% if contract and contract.end_date %}{{ contract.end_date|date:'Y-m-d' }}{% endif %}" class="w-full px-3 py-2 border rounded text-sm"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Salaire mensuel (€)</label><input type="number" step="0.01" name="salary" value="{{ contract.salary|default:'0' }}" class="w-full px-3 py-2 border rounded text-sm"></div>
            <div class="col-span-2"><label class="block text-sm font-medium text-gray-700 mb-1">Description</label><textarea name="description" rows="3" class="w-full px-3 py-2 border rounded text-sm">{{ contract.description|default:'' }}</textarea></div>
        </div>
        <div class="flex gap-3 pt-2">
            <button type="submit" class="bg-[#1a3a6b] text-white px-6 py-2 rounded-lg text-sm hover:bg-blue-800">Enregistrer</button>
            <a href="{% url 'hr_contract_list' %}" class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 text-sm">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
