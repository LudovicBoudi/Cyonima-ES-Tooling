{% extends 'hr/base_hr.html' %}
{% block title %}Supprimer — {{ employee }}{% endblock %}
{% block hr_content %}
<div class="max-w-lg mx-auto bg-white rounded-xl shadow p-6 text-center">
    <h1 class="text-xl font-bold text-red-700 mb-4">Supprimer {{ employee }} ?</h1>
    <p class="text-gray-600 mb-6">Tous les contrats et congés liés seront également supprimés.</p>
    <form method="post" class="flex gap-3 justify-center">
        {% csrf_token %}
        <button type="submit" class="bg-red-700 text-white px-6 py-2 rounded-lg text-sm hover:bg-red-800">Confirmer</button>
        <a href="{% url 'hr_employee_detail' employee.pk %}" class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 text-sm">Annuler</a>
    </form>
</div>
{% endblock %}
