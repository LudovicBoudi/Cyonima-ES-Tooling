{% extends 'hr/base_hr.html' %}
{% block title %}{{ title }}{% endblock %}
{% block hr_content %}
<div class="max-w-lg mx-auto">
    <div class="bg-white rounded-xl shadow p-6">
        <h1 class="text-xl font-bold mb-6">{{ title }}</h1>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Année</label>
                    <input type="number" name="year" value="{{ evaluation.year|default:'' }}" min="2020" max="2099" required class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Note (1-5)</label>
                    <select name="rating" required class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                        <option value="">—</option>
                        {% for i in "12345" %}
                        <option value="{{ i }}"{% if evaluation.rating|stringformat:"s" == i %} selected{% endif %}>{{ i }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Avis</label>
                <textarea name="comment" rows="6" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">{{ evaluation.comment|default:'' }}</textarea>
            </div>
            <div class="flex gap-3 pt-2">
                <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg text-sm hover:bg-indigo-700">Enregistrer</button>
                <a href="{% url 'hr_employee_detail' employee.pk %}" class="text-gray-500 px-4 py-2 text-sm hover:underline">Annuler</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
