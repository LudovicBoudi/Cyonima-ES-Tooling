{% extends 'hr/base_hr.html' %}
{% block title %}{{ title }}{% endblock %}
{% block hr_content %}
<div class="max-w-2xl mx-auto bg-white rounded-xl shadow p-6">
    <h1 class="text-xl font-semibold mb-6">{{ title }}</h1>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div class="grid grid-cols-2 gap-4">
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Prénom *</label><input type="text" name="first_name" value="{{ employee.first_name|default:'' }}" required class="w-full px-3 py-2 border rounded text-sm"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Nom *</label><input type="text" name="last_name" value="{{ employee.last_name|default:'' }}" required class="w-full px-3 py-2 border rounded text-sm"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Email</label><input type="email" name="email" value="{{ employee.email|default:'' }}" class="w-full px-3 py-2 border rounded text-sm"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Téléphone</label><input type="text" name="phone" value="{{ employee.phone|default:'' }}" class="w-full px-3 py-2 border rounded text-sm"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Portable</label><input type="text" name="mobile" value="{{ employee.mobile|default:'' }}" class="w-full px-3 py-2 border rounded text-sm"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Département</label><select name="department" class="w-full px-3 py-2 border rounded text-sm"><option value="">—</option>{% for d in departments %}<option value="{{ d.pk }}" {% if employee and employee.department_id == d.pk %}selected{% endif %}>{{ d.name }}</option>{% endfor %}</select></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Poste</label><input type="text" name="job_title" value="{{ employee.job_title|default:'' }}" class="w-full px-3 py-2 border rounded text-sm"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Statut</label><select name="status" class="w-full px-3 py-2 border rounded text-sm">{% for code, label in status_choices %}<option value="{{ code }}" {% if employee and employee.status == code %}selected{% endif %}>{{ label }}</option>{% endfor %}</select></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Date d'embauche</label><input type="date" name="hire_date" value="{% if employee and employee.hire_date %}{{ employee.hire_date|date:'Y-m-d' }}{% endif %}" class="w-full px-3 py-2 border rounded text-sm"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Date de naissance</label><input type="date" name="birth_date" value="{% if employee and employee.birth_date %}{{ employee.birth_date|date:'Y-m-d' }}{% endif %}" class="w-full px-3 py-2 border rounded text-sm"></div>
            <div class="col-span-2"><label class="block text-sm font-medium text-gray-700 mb-1">Société d'origine</label><input type="text" name="company" value="{{ employee.company|default:'' }}" placeholder="Pour les prestataires externes" class="w-full px-3 py-2 border rounded text-sm"></div>
            <div class="col-span-2"><label class="block text-sm font-medium text-gray-700 mb-1">Adresse</label><textarea name="address" rows="2" class="w-full px-3 py-2 border rounded text-sm">{{ employee.address|default:'' }}</textarea></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Contact urgence</label><input type="text" name="emergency_contact" value="{{ employee.emergency_contact|default:'' }}" class="w-full px-3 py-2 border rounded text-sm"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Tél. urgence</label><input type="text" name="emergency_phone" value="{{ employee.emergency_phone|default:'' }}" class="w-full px-3 py-2 border rounded text-sm"></div>
            <div class="col-span-2"><label class="block text-sm font-medium text-gray-700 mb-1">Notes</label><textarea name="notes" rows="3" class="w-full px-3 py-2 border rounded text-sm">{{ employee.notes|default:'' }}</textarea></div>
        </div>
        <div class="flex gap-3 pt-2">
            <button type="submit" class="bg-[#1a3a6b] text-white px-6 py-2 rounded-lg text-sm hover:bg-blue-800">Enregistrer</button>
            <a href="{% if employee %}{% url 'hr_employee_detail' employee.pk %}{% else %}{% url 'hr_employee_list' %}{% endif %}" class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 text-sm">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
