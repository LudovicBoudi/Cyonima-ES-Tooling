{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
    <div class="bg-white rounded-xl shadow p-6">
        <h1 class="text-xl font-bold mb-6">{{ title }}</h1>
        <form method="post" enctype="multipart/form-data" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Fichier CV (PDF recommandé)</label>
                <input type="file" name="file" accept=".pdf,application/pdf" required class="w-full text-sm">
            </div>
            <div class="flex gap-3 pt-2">
                <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg text-sm hover:bg-indigo-700">Enregistrer</button>
                <a href="{% url 'hr_profil' %}" class="text-gray-500 px-4 py-2 text-sm hover:underline">Annuler</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
