{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
    <div class="bg-white rounded-xl shadow p-6">
        <h1 class="text-xl font-bold mb-6">{{ title }}</h1>
        <form method="post" enctype="multipart/form-data" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nom de la certification</label>
                <input type="text" name="name" value="{{ certification.name|default:'' }}" required class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Organisme émetteur</label>
                <input type="text" name="company" value="{{ certification.company|default:'' }}" required class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Année d'obtention</label>
                <input type="number" name="year" value="{{ certification.year|default:'' }}" min="1950" max="2099" required class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Copie de la certification</label>
                <input type="file" name="file" accept="application/pdf,image/*" class="w-full text-sm">
                {% if certification and certification.file %}
                <p class="text-xs text-gray-400 mt-1">Fichier actuel : <a href="{{ certification.file.url }}" target="_blank" class="text-indigo-600 hover:underline">Voir</a></p>
                {% endif %}
            </div>
            <div class="flex gap-3 pt-2">
                <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg text-sm hover:bg-indigo-700">Enregistrer</button>
                <a href="{% url 'hr_profil' %}" class="text-gray-500 px-4 py-2 text-sm hover:underline">Annuler</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
