{% extends 'administration/base_admin.html' %}

{% block title %}Modifier {{ edit_user.username }}{% endblock %}

{% block admin_content %}
<div class="max-w-lg mx-auto bg-white rounded-lg shadow p-6">
    <h1 class="text-xl font-semibold mb-6">Modifier : {{ edit_user.username }}</h1>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nom d'utilisateur</label>
            <input type="text" name="username" value="{{ edit_user.username }}" required class="w-full px-3 py-2 border rounded text-sm">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input type="email" name="email" value="{{ edit_user.email }}" class="w-full px-3 py-2 border rounded text-sm">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Rôles</label>
            <div class="space-y-2">
                {% for role in all_roles %}
                <label class="flex items-center gap-2 text-sm">
                    <input type="checkbox" name="roles" value="{{ role.pk }}" {% if role in edit_user.profile.roles.all %}checked{% endif %} class="rounded">
                    {{ role.label }}
                </label>
                {% endfor %}
            </div>
        </div>
        <div class="flex items-center gap-2">
            <input type="checkbox" name="is_active" id="id_is_active" {% if edit_user.is_active %}checked{% endif %} class="rounded">
            <label for="id_is_active" class="text-sm">Compte actif</label>
        </div>
        <div class="flex gap-3">
            <button type="submit" class="bg-[#1a3a6b] text-white px-4 py-2 rounded text-sm hover:bg-[#142b52]">Enregistrer</button>
            <a href="{% url 'admin_user_list' %}" class="px-4 py-2 rounded text-sm border border-gray-300 hover:bg-gray-50">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
