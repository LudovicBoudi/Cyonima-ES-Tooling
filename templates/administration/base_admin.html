{% extends 'base.html' %}

{% block content %}
<div class="flex gap-6">
    <aside class="w-64 shrink-0">
        <div class="bg-white rounded-lg shadow p-4 space-y-1">
            <h3 class="font-semibold text-gray-700 mb-3 px-3">Administration</h3>
            <a href="{% url 'admin_dashboard' %}" class="block px-3 py-2 rounded text-sm hover:bg-gray-100 {% if request.resolver_match.url_name == 'admin_dashboard' %}bg-gray-100 font-medium{% endif %}">Tableau de bord</a>
            <a href="{% url 'admin_user_list' %}" class="block px-3 py-2 rounded text-sm hover:bg-gray-100 {% if request.resolver_match.url_name == 'admin_user_list' %}bg-gray-100 font-medium{% endif %}">Utilisateurs</a>
            <a href="{% url 'admin_site_config' %}" class="block px-3 py-2 rounded text-sm hover:bg-gray-100 {% if request.resolver_match.url_name == 'admin_site_config' %}bg-gray-100 font-medium{% endif %}">Configuration</a>
            <a href="{% url 'admin_backup' %}" class="block px-3 py-2 rounded text-sm hover:bg-gray-100 {% if request.resolver_match.url_name == 'admin_backup' %}bg-gray-100 font-medium{% endif %}">Sauvegarde</a>
            <a href="{% url 'admin_analytics' %}" class="block px-3 py-2 rounded text-sm hover:bg-gray-100 {% if request.resolver_match.url_name == 'admin_analytics' %}bg-gray-100 font-medium{% endif %}">Web Analytics</a>
            <hr class="my-2">
            <a href="{% url 'home' %}" class="block px-3 py-2 rounded text-sm text-gray-500 hover:bg-gray-100">Retour à l'accueil</a>
        </div>
    </aside>
    <div class="flex-1 min-w-0">
        {% block admin_content %}{% endblock %}
    </div>
</div>
{% endblock %}
