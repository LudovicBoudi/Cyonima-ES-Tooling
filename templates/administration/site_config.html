{% extends 'administration/base_admin.html' %}

{% block title %}Configuration du site{% endblock %}

{% block admin_content %}
<div class="max-w-lg mx-auto bg-white rounded-lg shadow p-6">
    <h1 class="text-xl font-semibold mb-6">Configuration du site</h1>
    <form method="post" enctype="multipart/form-data" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nom du site</label>
            <input type="text" name="site_name" value="{{ config.site_name }}" class="w-full px-3 py-2 border rounded text-sm">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Logo</label>
            {% if config.logo %}
                <div class="mb-2">
                    <img src="{{ config.logo.url }}" alt="Logo actuel" class="h-10">
                </div>
            {% endif %}
            <input type="file" name="logo" accept="image/png,image/svg+xml" class="w-full text-sm">
        </div>
        <div class="flex gap-3">
            <button type="submit" class="bg-[#1a3a6b] text-white px-4 py-2 rounded text-sm hover:bg-[#142b52]">Enregistrer</button>
            <a href="{% url 'admin_dashboard' %}" class="px-4 py-2 rounded text-sm border border-gray-300 hover:bg-gray-50">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
