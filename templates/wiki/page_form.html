{% extends 'base.html' %}
{% block title %}{{ title }} - Wiki{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">{{ title }}</h1>
    <form method="post" class="bg-white rounded-xl shadow-md p-6 space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Titre</label>
            <input type="text" name="title" value="{{ page.title|default:'' }}" required class="w-full rounded-lg border-gray-300">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Contenu</label>
            <textarea name="content" id="wiki-content" rows="20" class="w-full rounded-lg border-gray-300">{{ page.content|default:'' }}</textarea>
        </div>
        <div class="flex gap-3 pt-2">
            <button type="submit" class="bg-[#1a3a6b] text-white px-6 py-2 rounded-lg text-sm hover:bg-blue-800">Enregistrer</button>
            <a href="{% if page %}{% url 'wiki_detail' page.slug %}{% else %}{% url 'wiki_list' %}{% endif %}" class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 text-sm">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
{% block extra_js %}
<script src="https://cdn.ckeditor.com/ckeditor5/41.0.0/classic/ckeditor.js"></script>
<script>ClassicEditor.create(document.querySelector('#wiki-content')).catch(e=>console.error(e));</script>
{% endblock %}
