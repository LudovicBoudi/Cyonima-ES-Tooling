{% extends 'base.html' %}
{% block title %}Nouveau ticket - Guichet IT{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Nouveau ticket</h1>
    <form method="post" class="bg-white rounded-xl shadow-md p-6 space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Type</label>
            <select name="ticket_type" class="w-full rounded-lg border-gray-300">
                <option value="incident">Incident</option>
                <option value="ebi">Expression de Besoin Informatique</option>
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Titre</label>
            <input type="text" name="title" required class="w-full rounded-lg border-gray-300">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
            <textarea name="description" rows="5" class="w-full rounded-lg border-gray-300"></textarea>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Assigné à</label>
            <select name="assigned_to" class="w-full rounded-lg border-gray-300">
                <option value="">Non assigné</option>
                {% for u in users %}
                <option value="{{ u.id }}">{{ u.get_full_name|default:u.username }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="flex gap-3 pt-2">
            <button type="submit" class="bg-[#1a3a6b] text-white px-6 py-2 rounded-lg text-sm hover:bg-blue-800">Créer</button>
            <a href="{% url 'guichet_list' %}" class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 text-sm">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
