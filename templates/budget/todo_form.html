{% extends 'budget/base_budget.html' %}
{% load static %}
{% block title %}Nouvelle tâche - {{ site_config.site_name }}{% endblock %}
{% block budget_content %}
<div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-800">Nouvelle tâche</h1>
</div>
<form method="post" class="bg-white rounded-xl shadow-md p-6 max-w-lg space-y-4">
    {% csrf_token %}
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Titre</label>
        <input type="text" name="title" required class="w-full rounded-lg border-gray-300">
    </div>
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
        <textarea name="description" rows="3" class="w-full rounded-lg border-gray-300"></textarea>
    </div>
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Date limite</label>
        <input type="date" name="deadline" required class="w-full rounded-lg border-gray-300">
    </div>
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Statut</label>
        <select name="status" class="w-full rounded-lg border-gray-300">
            <option value="todo">À faire</option>
            <option value="in_progress">En cours</option>
            <option value="done">Réalisé</option>
        </select>
    </div>
    <div class="flex justify-end gap-4 pt-2">
        <a href="{% url 'todo_kanban' %}" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">Annuler</a>
        <button type="submit" class="px-4 py-2 bg-[#1a3a6b] text-white rounded-lg hover:bg-blue-800">Créer</button>
    </div>
</form>
{% endblock %}
