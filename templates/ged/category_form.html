{% extends 'ged/base_ged.html' %}
{% block title %}{{ title }}{% endblock %}
{% block ged_content %}
<div class="max-w-lg mx-auto bg-white rounded-xl shadow p-6">
    <h1 class="text-xl font-semibold mb-6">{{ title }}</h1>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nom *</label>
            <input type="text" name="name" value="{{ cat.name|default:'' }}" required maxlength="100" class="w-full px-3 py-2 border rounded text-sm">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Couleur</label>
            <div class="flex items-center gap-3">
                <input type="color" name="color" value="{{ cat.color|default:'#1a3a6b' }}" class="w-10 h-10 rounded border cursor-pointer">
                <input type="text" name="color_hex" value="{{ cat.color|default:'#1a3a6b' }}" maxlength="7" class="px-3 py-2 border rounded text-sm w-24 font-mono" oninput="this.previousElementSibling.value=this.value" onchange="this.previousElementSibling.value=this.value">
            </div>
        </div>
        <div class="flex gap-3 pt-2">
            <button type="submit" class="bg-[#1a3a6b] text-white px-6 py-2 rounded-lg text-sm hover:bg-blue-800">Enregistrer</button>
            <a href="{% url 'ged_category_list' %}" class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 text-sm">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
