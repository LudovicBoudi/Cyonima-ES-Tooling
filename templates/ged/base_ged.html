{% extends 'base.html' %}
{% block content %}
<div class="flex gap-6">
    <aside class="w-56 shrink-0">
        <div class="bg-white rounded-lg shadow p-4 space-y-1 sticky top-24">
            <h3 class="font-semibold text-gray-700 mb-3 px-3">GED</h3>
            <a href="{% url 'ged_document_list' %}" class="block px-3 py-2 rounded text-sm hover:bg-gray-100 {% if request.resolver_match.url_name == 'ged_document_list' %}bg-gray-100 font-medium{% endif %}">Tous les documents</a>
            <a href="{% url 'ged_document_create' %}" class="block px-3 py-2 rounded text-sm hover:bg-gray-100 {% if request.resolver_match.url_name == 'ged_document_create' %}bg-gray-100 font-medium{% endif %}">Ajouter un document</a>
            <hr class="my-2">
            <h4 class="text-xs font-semibold text-gray-400 uppercase px-3 mb-1">Catégories</h4>
            {% for cat in categories %}
            <a href="{% url 'ged_document_list' %}?cat={{ cat.pk }}" class="block px-3 py-1.5 rounded text-sm hover:bg-gray-100 {% if cat == request.GET.cat %}bg-gray-100 font-medium{% endif %}">
                <span class="inline-block w-2 h-2 rounded-full mr-1.5" style="background:{{ cat.color }}"></span>{{ cat.name }}
            </a>
            {% empty %}
            <p class="text-xs text-gray-400 px-3">Aucune catégorie</p>
            {% endfor %}
            <hr class="my-2">
            <a href="{% url 'home' %}" class="block px-3 py-2 rounded text-sm text-gray-500 hover:bg-gray-100">← Accueil</a>
        </div>
    </aside>
    <div class="flex-1 min-w-0">
        {% block ged_content %}{% endblock %}
    </div>
</div>
{% endblock %}
